
---

-   defaults:
        link:
            relink: true

-   clean:
        -   '~'

-   create:
        -   ~/.claude

-   link:
        ~/.claude/settings.json: claude/settings.json
        ~/.gitconfig: gitconfig
        ~/.zshrc: zshrc
        ~/.bash_profile: bash_profile
        ~/.bashrc: bashrc
        ~/.inputrc: inputrc
        ~/.p10k.zsh: p10k.zsh
        ~/.tmuxp: tmuxp

# EOF
